# Dependabot keeps dependencies current. For GitHub Actions it bumps the pinned
# commit SHA *and* the `# vX.Y.Z` comment together, so SHA-pinning (see
# .github/workflows/*) stays secure without going stale. Updates are grouped per
# ecosystem into a single weekly PR to keep noise low, and held for a 48h cooldown
# after a release so freshly-published (and potentially compromised) versions are
# not adopted immediately. The npm ecosystem reads pnpm-lock.yaml.
# Note: Swift (SPM) is omitted — Dependabot does not support it.
version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    cooldown:
      default-days: 2
    groups:
      github-actions:
        patterns: ["*"]
    commit-message:
      prefix: ci

  - package-ecosystem: npm
    directory: /docs
    schedule:
      interval: weekly
    cooldown:
      default-days: 2
    groups:
      docs:
        patterns: ["*"]
    commit-message:
      prefix: docs

  - package-ecosystem: npm
    directory: /typescript
    schedule:
      interval: weekly
    cooldown:
      default-days: 2
    groups:
      typescript:
        patterns: ["*"]
    commit-message:
      prefix: ts

  - package-ecosystem: gomod
    directory: /golang
    schedule:
      interval: weekly
    cooldown:
      default-days: 2
    groups:
      golang:
        patterns: ["*"]
    commit-message:
      prefix: go

  - package-ecosystem: gradle
    directory: /java
    schedule:
      interval: weekly
    cooldown:
      default-days: 2
    groups:
      java:
        patterns: ["*"]
    commit-message:
      prefix: java

  - package-ecosystem: gradle
    directory: /kotlin
    schedule:
      interval: weekly
    cooldown:
      default-days: 2
    groups:
      kotlin:
        patterns: ["*"]
    commit-message:
      prefix: kotlin
