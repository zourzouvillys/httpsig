name: Release Go

on:
  push:
    tags: ['go/v*']

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: '1.23'

      - name: Test
        working-directory: golang
        run: go test -race ./...

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/go/}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          name: "Go ${{ steps.version.outputs.version }}"
          tag_name: ${{ github.ref }}
          generate_release_notes: true
          body: |
            ## Go ${{ steps.version.outputs.version }}

            ```bash
            go get github.com/zourzouvillys/httpsig/golang@${{ steps.version.outputs.version }}
            ```

            Go modules are published automatically via [proxy.golang.org](https://proxy.golang.org).
