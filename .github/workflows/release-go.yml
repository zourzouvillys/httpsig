name: Release Go

on:
  push:
    tags: ['go/v*']

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.23'

      - name: Test
        working-directory: golang
        run: go test -race ./...

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/go/}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          name: "Go ${{ steps.version.outputs.version }}"
          tag_name: ${{ github.ref }}
          generate_release_notes: true
          body: |
            ## Go ${{ steps.version.outputs.version }}

            ```bash
            go get github.com/zourzouvillys/httpsig/golang@${{ steps.version.outputs.version }}
            ```

            Go modules are published automatically via [proxy.golang.org](https://proxy.golang.org).
