name: Release Go

on:
  push:
    tags: ['go/v*']

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: '1.23'

      - name: Test
        working-directory: golang
        run: go test -race ./...

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/go/}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          name: "Go ${{ steps.version.outputs.version }}"
          tag_name: ${{ github.ref }}
          generate_release_notes: true
          body: |
            ## Go ${{ steps.version.outputs.version }}

            ```bash
            go get github.com/zourzouvillys/httpsig/golang@${{ steps.version.outputs.version }}
            ```

            Go modules are published automatically via [proxy.golang.org](https://proxy.golang.org).
