name: Swift

on:
  push:
    paths: ['swift/**', 'testdata/**', '.github/workflows/swift.yml']
  pull_request:
    paths: ['swift/**', 'testdata/**', '.github/workflows/swift.yml']

jobs:
  test:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Build
        working-directory: swift
        run: swift build

      - name: Test
        working-directory: swift
        run: swift test
