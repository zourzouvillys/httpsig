name: Swift

on:
  push:
    paths: ['swift/**', 'testdata/**', '.github/workflows/swift.yml']
  pull_request:
    paths: ['swift/**', 'testdata/**', '.github/workflows/swift.yml']
  workflow_dispatch:

# Read-only token: this runs untrusted PR code (build/test) and needs no write access.
permissions:
  contents: read

jobs:
  test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Build
        working-directory: swift
        run: swift build

      - name: Test
        working-directory: swift
        run: swift test
