name: Swift

on:
  push:
    paths: ['swift/**', 'testdata/**', '.github/workflows/swift.yml']
  pull_request:
    paths: ['swift/**', 'testdata/**', '.github/workflows/swift.yml']
  workflow_dispatch:

# Read-only token: this runs untrusted PR code (build/test) and needs no write access.
permissions:
  contents: read

jobs:
  test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Build
        working-directory: swift
        run: swift build

      - name: Test
        working-directory: swift
        run: swift test
