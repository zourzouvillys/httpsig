name: TypeScript

on:
  push:
    paths: ['typescript/**', 'testdata/**', '.github/workflows/typescript.yml']
  pull_request:
    paths: ['typescript/**', 'testdata/**', '.github/workflows/typescript.yml']
  workflow_dispatch:

# Read-only token: this runs untrusted PR code (npm ci postinstall, tests, build) and needs no write access.
permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ['20', '22']
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install
        working-directory: typescript
        run: npm ci

      - name: Lint
        working-directory: typescript
        run: npx tsc --noEmit

      - name: Test
        working-directory: typescript
        run: npx vitest run

      - name: Build
        working-directory: typescript
        run: npm run build
