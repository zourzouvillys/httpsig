name: Kotlin

on:
  push:
    paths: ['kotlin/**', 'testdata/**', '.github/workflows/kotlin.yml']
  pull_request:
    paths: ['kotlin/**', 'testdata/**', '.github/workflows/kotlin.yml']
  workflow_dispatch:

# Read-only token: this runs untrusted PR code (build/test) and needs no write access.
permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        java-version: ['17', '21']
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: ${{ matrix.java-version }}

      - uses: gradle/actions/setup-gradle@5e2ebd065dc2488b7a6ad670704656cbbe1e8f60 # v6.1.1

      - name: Check
        working-directory: kotlin
        run: ./gradlew check
