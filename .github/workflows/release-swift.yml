name: Release Swift

on:
  push:
    tags: ['swift/v*']

jobs:
  release:
    runs-on: macos-15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Test
        working-directory: swift
        run: swift test

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/swift/v}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          name: "Swift v${{ steps.version.outputs.version }}"
          tag_name: ${{ github.ref }}
          generate_release_notes: true
          body: |
            ## Swift v${{ steps.version.outputs.version }}

            ```swift
            // Package.swift
            dependencies: [
                .package(url: "https://github.com/zourzouvillys/httpsig.git", from: "${{ steps.version.outputs.version }}")
            ]
            ```

            SPM resolves packages via git tags. No registry publication needed.
