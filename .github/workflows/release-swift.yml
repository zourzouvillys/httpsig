name: Release Swift

on:
  push:
    tags: ['swift/v*']

jobs:
  release:
    runs-on: macos-15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Test
        working-directory: swift
        run: swift test

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/swift/v}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          name: "Swift v${{ steps.version.outputs.version }}"
          tag_name: ${{ github.ref }}
          generate_release_notes: true
          body: |
            ## Swift v${{ steps.version.outputs.version }}

            ```swift
            // Package.swift
            dependencies: [
                .package(url: "https://github.com/zourzouvillys/httpsig.git", from: "${{ steps.version.outputs.version }}")
            ]
            ```

            SPM resolves packages via git tags. No registry publication needed.
