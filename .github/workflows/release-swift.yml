name: Release Swift

on:
  push:
    tags: ['swift/v*']

jobs:
  release:
    runs-on: macos-15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Test
        working-directory: swift
        run: swift test

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/swift/v}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          name: "Swift v${{ steps.version.outputs.version }}"
          tag_name: ${{ github.ref }}
          generate_release_notes: true
          body: |
            ## Swift v${{ steps.version.outputs.version }}

            ```swift
            // Package.swift
            dependencies: [
                .package(url: "https://github.com/zourzouvillys/httpsig.git", from: "${{ steps.version.outputs.version }}")
            ]
            ```

            SPM resolves packages via git tags. No registry publication needed.
