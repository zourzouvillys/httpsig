name: Go

on:
  push:
    paths: ['golang/**', 'testdata/**', '.github/workflows/go.yml']
  pull_request:
    paths: ['golang/**', 'testdata/**', '.github/workflows/go.yml']

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ['1.22', '1.23']
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Vet
        working-directory: golang
        run: go vet ./...

      - name: Test
        working-directory: golang
        run: go test -race -v ./...

      - name: Build
        working-directory: golang
        run: go build ./...
