name: Go

on:
  push:
    paths: ['golang/**', 'testdata/**', '.github/workflows/go.yml']
  pull_request:
    paths: ['golang/**', 'testdata/**', '.github/workflows/go.yml']
  workflow_dispatch:

# Read-only token: this runs untrusted PR code (compile/test) and needs no write access.
permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ['1.22', '1.23']
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: ${{ matrix.go-version }}
          cache-dependency-path: golang/go.sum

      - name: Vet
        working-directory: golang
        run: go vet ./...

      - name: Test
        working-directory: golang
        run: go test -race -v ./...

      - name: Build
        working-directory: golang
        run: go build ./...
