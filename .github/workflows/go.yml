name: Go

on:
  push:
    paths: ['golang/**', 'testdata/**', '.github/workflows/go.yml']
  pull_request:
    paths: ['golang/**', 'testdata/**', '.github/workflows/go.yml']
  workflow_dispatch:

# Read-only token: this runs untrusted PR code (compile/test) and needs no write access.
permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ['1.22', '1.23']
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ matrix.go-version }}
          cache-dependency-path: golang/go.sum

      - name: Vet
        working-directory: golang
        run: go vet ./...

      - name: Test
        working-directory: golang
        run: go test -race -v ./...

      - name: Build
        working-directory: golang
        run: go build ./...
