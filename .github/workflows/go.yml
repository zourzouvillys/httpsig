name: Go

on:
  push:
    paths: ['golang/**', 'testdata/**', '.github/workflows/go.yml']
  pull_request:
    paths: ['golang/**', 'testdata/**', '.github/workflows/go.yml']
  workflow_dispatch:

# Read-only token: this runs untrusted PR code (compile/test) and needs no write access.
permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ['1.22', '1.23']
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: ${{ matrix.go-version }}
          cache-dependency-path: golang/go.sum

      - name: Vet
        working-directory: golang
        run: go vet ./...

      - name: Test
        working-directory: golang
        run: go test -race -v ./...

      - name: Build
        working-directory: golang
        run: go build ./...
