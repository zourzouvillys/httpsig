name: Release TypeScript

on:
  push:
    tags: ['ts/v*']

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Install and test
        working-directory: typescript
        run: |
          npm ci
          npm test

      - name: Build
        working-directory: typescript
        run: npm run build

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/ts/v}" >> "$GITHUB_OUTPUT"

      - name: Set package version
        working-directory: typescript
        run: npm version "${{ steps.version.outputs.version }}" --no-git-tag-version

      - name: Publish to npm
        working-directory: typescript
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          name: "TypeScript v${{ steps.version.outputs.version }}"
          tag_name: ${{ github.ref }}
          generate_release_notes: true
          body: |
            ## TypeScript v${{ steps.version.outputs.version }}

            ```bash
            npm install @zourzouvillys/httpsig@${{ steps.version.outputs.version }}
            ```
