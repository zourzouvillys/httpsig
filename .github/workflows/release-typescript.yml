name: Release TypeScript

on:
  push:
    tags: ['ts/v*']

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Install and test
        working-directory: typescript
        run: |
          npm ci
          npm test

      - name: Build
        working-directory: typescript
        run: npm run build

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/ts/v}" >> "$GITHUB_OUTPUT"

      - name: Set package version
        working-directory: typescript
        run: npm version "${{ steps.version.outputs.version }}" --no-git-tag-version

      - name: Publish to npm
        working-directory: typescript
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          name: "TypeScript v${{ steps.version.outputs.version }}"
          tag_name: ${{ github.ref }}
          generate_release_notes: true
          body: |
            ## TypeScript v${{ steps.version.outputs.version }}

            ```bash
            npm install @zourzouvillys/httpsig@${{ steps.version.outputs.version }}
            ```
