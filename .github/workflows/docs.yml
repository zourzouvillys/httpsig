name: Docs

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'typescript/**'
  pull_request:
    paths:
      - 'docs/**'
      - 'typescript/**'
  workflow_dispatch:

# Least privilege by default. The build job runs on PRs and executes untrusted
# PR code (dependency install/build scripts, the PR's build.mjs/esbuild), so it
# must never hold write scopes. Only the deploy job — which never runs on PRs —
# gets the pages/id-token write permissions.
permissions:
  contents: read

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: docs
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
        with:
          version: 10

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: docs/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile
      - run: pnpm build

      # Equivalent to actions/upload-pages-artifact, inlined so every action stays
      # SHA-pinned: that composite action calls actions/upload-artifact@v4 by tag,
      # which the repo's "require SHA pin" policy rejects.
      - name: Archive site for Pages
        if: github.event_name != 'pull_request'
        run: tar --dereference --hard-dereference --directory dist -cvf "$RUNNER_TEMP/artifact.tar" --exclude=.git --exclude=.github .

      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: github-pages
          path: ${{ runner.temp }}/artifact.tar
          retention-days: 1
          if-no-files-found: error

  deploy:
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5
