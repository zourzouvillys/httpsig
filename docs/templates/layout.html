<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{title}}</title>
  <meta name="description" content="httpsig — HTTP Message Signatures (RFC 9421) and Content-Digest (RFC 9530) for Go, TypeScript, Java, Swift, and Kotlin. Plus an interactive in-browser signing & verification tool." />
  <link rel="icon" type="image/svg+xml" href="{{base}}/img/favicon.svg" />
  <link rel="icon" type="image/png" sizes="32x32" href="{{base}}/img/favicon-32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="{{base}}/img/favicon-16.png" />
  <link rel="icon" href="{{base}}/img/favicon.ico" sizes="any" />
  <link rel="apple-touch-icon" href="{{base}}/img/apple-touch-icon.png" />
  <meta name="theme-color" content="#C2560F" />
  <link rel="stylesheet" href="{{base}}/styles.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.10.0/styles/github.min.css" media="(prefers-color-scheme: light)" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.10.0/styles/github-dark.min.css" media="(prefers-color-scheme: dark)" />

</head>
<body>
  <header class="site-header">
    <div class="container container-wide">
      <a class="brand" href="{{base}}/">httpsig</a>
      <nav>
        {{nav}}
      </nav>
    </div>
  </header>
  <main class="site-main">
    {{body}}
  </main>
  <footer class="site-footer">
    <div class="container container-wide">
      <p><strong>httpsig</strong> implements <a href="https://www.rfc-editor.org/rfc/rfc9421">RFC 9421</a>

      across five languages. The <a href="{{base}}/playground/">playground</a> runs entirely in your browser —
      keys never leave the page. Source on <a href="https://github.com/zourzouvillys/httpsig">GitHub</a>.</p>
    </div>
  </footer>
